# Orquestación del monorepo (Sesión 7) — 4 servicios FastAPI + postgres.
# build.context es la RAÍZ del monorepo para que cada Dockerfile pueda copiar shared_core/.
# Variables compartidas (SECRET_KEY, ENCRYPTION_KEY, DB_*) desde .env (env_file), idénticas
# en los 4 servicios. Cada servicio crea SOLO sus tablas propias (los read-models no se
# crean: viven en ReadModelBase), así que no hay carrera de create_all entre servicios.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-salud_prenatal}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: service_auth/Dockerfile
    ports:
      - "8001:8001"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  usuarios:
    build:
      context: .
      dockerfile: service_usuarios/Dockerfile
    ports:
      - "8002:8002"
    env_file: .env
    # AUTH_LOGIN_URL alimenta el botón "Authorize" del Swagger de este servicio. Debe
    # ser localhost (el navegador del host llama a esto, no otro contenedor) — a
    # diferencia de AUTH_URL/USUARIOS_URL/etc, que son server-to-server dentro de la
    # red de compose y sí usan el nombre del servicio.
    environment:
      AUTH_LOGIN_URL: http://localhost:8001/api/v1/users/login
    depends_on:
      postgres:
        condition: service_healthy

  pagos:
    build:
      context: .
      dockerfile: service_pagos/Dockerfile
    ports:
      - "8003:8003"
    env_file: .env
    environment:
      AUTH_LOGIN_URL: http://localhost:8001/api/v1/users/login
    depends_on:
      postgres:
        condition: service_healthy

  transaccional:
    build:
      context: .
      dockerfile: service_transaccional/Dockerfile
    ports:
      - "8004:8004"
    env_file: .env
    environment:
      AUTH_LOGIN_URL: http://localhost:8001/api/v1/users/login
    depends_on:
      postgres:
        condition: service_healthy

  gateway:
    build:
      context: .
      dockerfile: service_gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    # Ruteo interno por nombre de servicio de compose (no localhost: cada servicio
    # es su propio contenedor). Estos valores son el default en el código; se dejan
    # explícitos para documentarlo y poder cambiar puertos sin tocar main.py.
    environment:
      AUTH_URL: http://auth:8001
      USUARIOS_URL: http://usuarios:8002
      PAGOS_URL: http://pagos:8003
      TRANSACCIONAL_URL: http://transaccional:8004
    depends_on:
      - auth
      - usuarios
      - pagos
      - transaccional

volumes:
  pgdata:
