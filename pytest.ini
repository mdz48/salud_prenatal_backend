[pytest]
markers =
    integration: pruebas que arrancan la app completa contra la BD de test (SQLite).
# Los servicios del monorepo son proyectos aparte: cada uno tiene su propio main.py
# y conftest. Un `pytest` en la raíz solo corre los tests del monolito; cada servicio
# se prueba con su ruta explícita (p.ej. `pytest service_pagos/tests`).
norecursedirs = .* build dist CVS _darcs *.egg node_modules venv .venv service_* shared_core
